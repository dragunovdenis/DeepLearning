name: Build and Test

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore DeepLearningCore.sln -PackagesDirectory packages

      - name: Build solution
        # Override PlatformToolset to v143 (VS 2022) since v145 (VS 2025) is not
        # available on GitHub-hosted runners.
        run: msbuild DeepLearningCore.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m

      - name: Run tests
        run: |
          $vstest = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -find "Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe"
          & $vstest "x64\Release\DeepLearningTest.dll" /Platform:x64

  pack-and-publish:
    # Only runs after build-and-test succeeds. Skipped on pull requests so
    # forks cannot trigger a publish; runs on master pushes (pack-only) and
    # on v*.*.* tag pushes (pack + publish to nuget.org and GitHub Packages).
    needs: build-and-test
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    permissions:
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Compute package version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
            # Derive a CI prerelease version from the latest reachable tag.
            $latest = (git describe --tags --abbrev=0 2>$null)
            if ([string]::IsNullOrWhiteSpace($latest)) { $latest = 'v0.0.0' }
            $base = $latest.TrimStart('v')
            $v = "$base-ci.$env:GITHUB_RUN_NUMBER"
          }
          Write-Host "Package version: $v"
          "version=$v" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Pack
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          nuget pack nuget\DeepLearningOpenCpp.nuspec `
            -Version ${{ steps.ver.outputs.version }} `
            -OutputDirectory artifacts `
            -NoDefaultExcludes

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepLearningOpenCpp-${{ steps.ver.outputs.version }}
          path: artifacts/*.nupkg

      - name: Publish to nuget.org
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            Write-Error "NUGET_API_KEY secret is not set on this repository. Add it under Settings > Secrets and variables > Actions."
            exit 1
          }
          dotnet nuget push artifacts\*.nupkg `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate

      - name: Publish to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push artifacts\*.nupkg `
            --api-key $env:GITHUB_TOKEN `
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json `
            --skip-duplicate
